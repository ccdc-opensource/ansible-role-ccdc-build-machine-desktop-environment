---
- name: Never Sleep Mode
  ansible.builtin.command: "{{ item }}"
  with_items:
    - pmset -a standbydelay 0
    - pmset -a displaysleep 0
    - pmset -a disablesleep 1
    - pmset -a disksleep 0
    - pmset -a hibernatemode 0
    - pmset disablesleep 1
    #  Not sure the stuff below works
    - systemsetup -setsleep Never
    - systemsetup -setharddisksleep Never
    - systemsetup -setcomputersleep Never
    - systemsetup -setdisplaysleep Never
  changed_when: false
  become: true

# Setup autologin using CLI tool. Not sure ansible has a module for sysadminctl
- name: Enable autologin # noqa: no-changed-when
  ansible.builtin.command: sysadminctl -autologin set -userName "{{ ansible_env.USER }}" on
  become: true

- name: Set Europe/London time zone
  community.general.timezone:
    name: "Europe/London"
  become: true
